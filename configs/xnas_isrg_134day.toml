# ISRG 134-day XNAS ITCH profiling (multi-stock universality study)
# High tick ratio ($452), low vol (2M/day), beta=1.17, spread ~2 bps

timescales = [1.0, 5.0, 10.0, 30.0, 60.0, 300.0]
reservoir_capacity = 10000
vpin_volume_bar_size = 500
vpin_window_bars = 50

[input]
data_dir = "../data/XNAS_ITCH/ISRG/mbo_2025-07-01_to_2026-01-09"
filename_pattern = "xnas-itch-{date}.mbo.ISRG.dbn.zst"
symbol = "ISRG"
exchange = "XNAS"

[trackers]
quality = true
ofi = true
spread = true
returns = true
volatility = true
lifecycle = true
trades = true
depth = true
liquidity = true
jumps = true
noise = true
vpin = true
cross_scale_ofi = true

[output]
output_dir = "output_ISRG_134day"
write_summaries = true
