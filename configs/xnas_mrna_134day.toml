# MRNA 134-day XNAS ITCH profiling (multi-stock universality study)
# Event-driven, 18% short interest, beta=1.34, spread 2-4 bps

timescales = [1.0, 5.0, 10.0, 30.0, 60.0, 300.0]
reservoir_capacity = 10000
vpin_volume_bar_size = 2000
vpin_window_bars = 50

[input]
data_dir = "../data/XNAS_ITCH/MRNA/mbo_2025-07-01_to_2026-01-09"
filename_pattern = "xnas-itch-{date}.mbo.MRNA.dbn.zst"
symbol = "MRNA"
exchange = "XNAS"

[trackers]
quality = true
ofi = true
spread = true
returns = true
volatility = true
lifecycle = true
trades = true
depth = true
liquidity = true
jumps = true
noise = true
vpin = true
