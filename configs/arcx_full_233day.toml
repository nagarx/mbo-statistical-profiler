# Full 233-day ARCX PILLAR NVDA profiling
# Expected runtime: ~30 minutes (ARCX has lower volume than XNAS)
# Expected output: 12 JSON files in output_arcx_full/

timescales = [1.0, 5.0, 10.0, 30.0, 60.0, 300.0]
reservoir_capacity = 10000
vpin_volume_bar_size = 5000
vpin_window_bars = 50

[input]
hot_store_dir = "../data/hot_store"
filename_pattern = "arcx-pillar-{date}.mbo.dbn"
symbol = "NVDA"
exchange = "ARCX"
# date_start and date_end omitted = process ALL available days

[trackers]
quality = true
ofi = true
spread = true
returns = true
volatility = true
lifecycle = true
trades = true
depth = true
liquidity = true
jumps = true
noise = true
vpin = true
cross_scale_ofi = true

[output]
output_dir = "output_arcx_full"
write_summaries = true
