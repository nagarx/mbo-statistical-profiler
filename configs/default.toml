# Default profiler configuration

timescales = [1.0, 5.0, 10.0, 30.0, 60.0, 300.0]
reservoir_capacity = 10000

[input]
hot_store_dir = "../data/hot_store"
filename_pattern = "xnas-itch-{date}.mbo.dbn"
symbol = "NVDA"
exchange = "XNAS"

[trackers]
quality = true
ofi = true
spread = true
returns = true
volatility = true
lifecycle = true
trades = true
depth = true
liquidity = true
jumps = true
noise = true

[output]
output_dir = "profiler_output"
write_summaries = true
